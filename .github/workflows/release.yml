name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── macOS arm64 (Apple Silicon — runs on Intel via Rosetta 2) ────────────
  build-mac:
    name: Build macOS arm64 (.dmg)
    runs-on: macos-14 # Apple Silicon runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Package Electron (macOS arm64)
        run: pnpm --filter @murmur/main dist:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: murmur-mac
          path: apps/main/release/*.dmg
          retention-days: 7

  # ── Windows x64 + ia32 ────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Package Electron (Windows)
        run: pnpm --filter @murmur/main dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: murmur-windows
          path: apps/main/release/*.exe
          retention-days: 7

  # ── Linux AppImage + deb ───────────────────────────────────────────────────
  build-linux:
    name: Build Linux (.AppImage + .deb)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux build deps
        run: sudo apt-get install -y libarchive-tools rpm

      - name: Build all packages
        run: pnpm build

      - name: Package Electron (Linux)
        run: pnpm --filter @murmur/main dist:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: murmur-linux
          path: |
            apps/main/release/*.AppImage
            apps/main/release/*.deb
          retention-days: 7

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows, build-linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: murmur-mac
          path: release/mac

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: murmur-windows
          path: release/win

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: murmur-linux
          path: release/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Murmur ${{ github.ref_name }}
          body: |
            ## Murmur ${{ github.ref_name }}

            ### Download

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS | `Murmur-*-arm64.dmg` | Apple Silicon + Intel |
            | Windows | `Murmur.Setup.*.exe` | Windows 10/11 x64 |
            | Linux (AppImage) | `Murmur-*.AppImage` | Any distro — make executable & run |
            | Linux (Debian/Ubuntu) | `Murmur-*.deb` | `sudo dpkg -i Murmur-*.deb` |

            ### Installation

            - **macOS**: Open the `.dmg`, drag Murmur to Applications. If blocked by Gatekeeper: right-click → Open.
            - **Windows**: Run the installer `.exe`. If SmartScreen blocks it: click "More info" → "Run anyway".
            - **Linux (AppImage)**: `chmod +x Murmur-*.AppImage && ./Murmur-*.AppImage`
            - **Linux (deb)**: `sudo dpkg -i Murmur-*.deb`

            > **WhatsApp** requires Google Chrome to be installed. Get it at https://www.google.com/chrome

            See [README](https://github.com/M-Hammad-Faisal/murmur#readme) for full setup guide.
          files: |
            release/mac/*.dmg
            release/win/*.exe
            release/linux/*.AppImage
            release/linux/*.deb
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
